<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink-bg: #10262A; --ink-bg-deep: #0B1B1E; --paper: #FBF7EE;
    --text-dark: #1D2321; --text-mute: #6B6558; --gold: #C79A44; --forest: #3F6B4F; --hairline: #E2DAC5;
  }
  * { box-sizing: border-box; }
  html { background: var(--ink-bg-deep); }
  body {
    margin: 0; background: radial-gradient(ellipse at top, var(--ink-bg) 0%, var(--ink-bg-deep) 100%);
    font-family: 'Inter', sans-serif; color: var(--text-dark); min-height: 100vh;
    padding: 48px 20px 80px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .masthead {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px; padding: 0 4px;
  }
  .masthead h1 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 28px;
    color: var(--paper); margin: 0;
  }
  .masthead a {
    color: var(--gold); text-decoration: none; font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  }
  .card {
    background: var(--paper); border-radius: 3px;
    box-shadow: 0 18px 40px -16px rgba(0,0,0,0.45); padding: 28px 32px;
  }
  .card h2 { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; margin: 0 0 18px 0; }
  .flash {
    background: #EAF3EC; color: var(--forest); padding: 10px 14px;
    border-radius: 3px; font-size: 13px; margin-bottom: 16px;
  }
  label {
    display: block; font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-mute); margin-bottom: 8px;
  }
  select {
    width: 100%; font-size: 15px; padding: 11px 12px; border-radius: 3px;
    border: 1px solid var(--hairline); background: white; color: var(--text-dark);
  }
  select:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  button {
    margin-top: 18px; font-size: 14px; font-weight: 500;
    padding: 11px 20px; border-radius: 3px; border: none; cursor: pointer;
    background: var(--ink-bg); color: var(--paper);
  }
  button:hover { background: var(--ink-bg-deep); }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>Settings</h1>
    <a href="/">← Back</a>
  </div>
  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
        <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <h2>Currency</h2>
    <form method="POST" action="/settings">
      <label>Display currency</label>
      <select name="currency">
        {% for code, symbol in currencies.items() %}
        <option value="{{ code }}" {% if code == current_currency %}selected{% endif %}>{{ code }} ({{ symbol.strip() }})</option>
        {% endfor %}
      </select>
      <button type="submit">Save</button>
    </form>
  </div>
</div>
</body>
</html>
