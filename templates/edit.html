<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit entry — Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink-bg: #10262A; --ink-bg-deep: #0B1B1E; --paper: #FBF7EE;
    --text-dark: #1D2321; --text-mute: #6B6558; --gold: #C79A44;
    --hairline: #E2DAC5;
  }
  * { box-sizing: border-box; }
  html { background: var(--ink-bg-deep); overscroll-behavior-y: none; }
  body {
    margin: 0;
    background: radial-gradient(ellipse at top, var(--ink-bg) 0%, var(--ink-bg-deep) 100%);
    font-family: 'Inter', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    padding: 48px 20px 80px;
    overscroll-behavior-y: none;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
    color: var(--paper);
    margin: 0 0 20px 0;
  }
  .card {
    background: var(--paper);
    border-radius: 3px;
    box-shadow: 0 18px 40px -16px rgba(0,0,0,0.45);
    padding: 28px 32px;
  }
  label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
    margin-bottom: 6px;
    margin-top: 18px;
  }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 11px 12px;
    border-radius: 3px;
    border: 1px solid var(--hairline);
    background: white;
    color: var(--text-dark);
  }
  input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  .btn-row { display: flex; gap: 10px; margin-top: 26px; }
  button, .btn-link {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 11px 18px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    flex: 1;
  }
  .btn-save { background: var(--ink-bg); color: var(--paper); }
  .btn-save:hover { background: var(--ink-bg-deep); }
  .btn-cancel { background: var(--hairline); color: var(--text-dark); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Edit entry</h1>
  <div class="card">
    <form action="/update/{{ expense.id }}" method="POST">
      <label>Date</label>
      <input type="date" name="date" value="{{ expense.date }}" required>

      <label>Amount (£)</label>
      <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required>

      <label>Category</label>
      <input type="text" name="category" value="{{ expense.category }}" required>

      <label>Note</label>
      <input type="text" name="note" value="{{ expense.note }}" required>

      <div class="btn-row">
        <a href="/" class="btn-link btn-cancel">Cancel</a>
        <button type="submit" class="btn-save">Save changes</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
