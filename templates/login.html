<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink-bg: #10262A; --ink-bg-deep: #0B1B1E; --paper: #FBF7EE;
    --text-dark: #1D2321; --text-mute: #6B6558; --gold: #C79A44; --brick: #B0453D; --hairline: #E2DAC5;
  }
  * { box-sizing: border-box; }
  html { background: var(--ink-bg-deep); }
  body {
    margin: 0; background: radial-gradient(ellipse at top, var(--ink-bg) 0%, var(--ink-bg-deep) 100%);
    font-family: 'Inter', sans-serif; color: var(--text-dark); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .wrap { max-width: 360px; width: 100%; }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 28px;
    color: var(--paper); text-align: center; margin: 0 0 24px 0;
  }
  .card {
    background: var(--paper); border-radius: 3px;
    box-shadow: 0 18px 40px -16px rgba(0,0,0,0.45); padding: 32px;
  }
  .flash {
    background: #FBEAE8; color: var(--brick); padding: 10px 14px;
    border-radius: 3px; font-size: 13px; margin-bottom: 16px;
  }
  label {
    display: block; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    color: var(--text-mute); margin-bottom: 6px; margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; font-size: 15px; padding: 11px 12px; border-radius: 3px;
    border: 1px solid var(--hairline); background: white; color: var(--text-dark);
  }
  input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  button {
    width: 100%; margin-top: 22px; font-size: 14px; font-weight: 500;
    padding: 12px; border-radius: 3px; border: none; cursor: pointer;
    background: var(--ink-bg); color: var(--paper);
  }
  button:hover { background: var(--ink-bg-deep); }
  .switch { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-mute); }
  .switch a { color: var(--gold-deep, #A87F34); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Ledger</h1>
  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
        <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="/login">
      <label>Email</label>
      <input type="email" name="email" required autofocus>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit">Log in</button>
    </form>
    <div class="switch">No account yet? <a href="/register">Create one</a></div>
  </div>
</div>
</body>
</html>
